<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Calculator</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #000000;
            --btn-gray: #333333;
            --btn-lightgray: #a5a5a5;
            --btn-orange: #ff9f0a;
            --text-white: #ffffff;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Калькулятор внизу, как на мобильных */
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .calculator {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #display {
            font-size: 5rem;
            text-align: right;
            margin-bottom: 10px;
            padding: 0 10px;
            overflow: hidden;
            white-space: nowrap;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 2rem;
            font-weight: 400;
            cursor: pointer;
            transition: brightness 0.2s;
        }

        button:active { filter: brightness(1.5); }

        .num { background-color: var(--btn-gray); color: white; }
        .op { background-color: var(--btn-orange); color: white; font-size: 2.5rem; }
        .sp { background-color: var(--btn-lightgray); color: black; }
        
        .zero { 
            grid-column: span 2; 
            aspect-ratio: initial; 
            border-radius: 50px; 
            text-align: left; 
            padding-left: 35px; 
        }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display">0</div>
    <div class="buttons">
        <button class="sp" onclick="clearAll()">AC</button>
        <button class="sp" onclick="toggleSign()">+/-</button>
        <button class="sp" onclick="percent()">%</button>
        <button class="op" onclick="setOp('/')">÷</button>
        
        <button class="num" onclick="addNum('7')">7</button>
        <button class="num" onclick="addNum('8')">8</button>
        <button class="num" onclick="addNum('9')">9</button>
        <button class="op" onclick="setOp('*')">×</button>
        
        <button class="num" onclick="addNum('4')">4</button>
        <button class="num" onclick="addNum('5')">5</button>
        <button class="num" onclick="addNum('6')">6</button>
        <button class="op" onclick="setOp('-')">-</button>
        
        <button class="num" onclick="addNum('1')">1</button>
        <button class="num" onclick="addNum('2')">2</button>
        <button class="num" onclick="addNum('3')">3</button>
        <button class="op" onclick="setOp('+')">+</button>
        
        <button class="num zero" onclick="addNum('0')">0</button>
        <button class="num" onclick="addNum('.')">,</button>
        <button class="op" onclick="calc()">=</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let displayValue = '0';
    let firstOperand = null;
    let operator = null;
    let waitingForSecondOperand = false;

    const display = document.querySelector('#display');

    function updateDisplay() {
        display.innerText = displayValue.substring(0, 7); // Ограничим длину
    }

    function addNum(num) {
        if (waitingForSecondOperand) {
            displayValue = num;
            waitingForSecondOperand = false;
        } else {
            displayValue = displayValue === '0' ? num : displayValue + num;
        }
        updateDisplay();
    }

    function setOp(nextOp) {
        const value = parseFloat(displayValue);
        if (operator && waitingForSecondOperand) {
            operator = nextOp;
            return;
        }
        if (firstOperand === null) {
            firstOperand = value;
        } else if (operator) {
            const result = performCalc[operator](firstOperand, value);
            displayValue = String(result);
            firstOperand = result;
        }
        waitingForSecondOperand = true;
        operator = nextOp;
        updateDisplay();
    }

    const performCalc = {
        '/': (first, second) => first / second,
        '*': (first, second) => first * second,
        '+': (first, second) => first + second,
        '-': (first, second) => first - second,
    };

    function calc() {
        if (operator === null || waitingForSecondOperand) return;
        const value = parseFloat(displayValue);
        displayValue = String(performCalc[operator](firstOperand, value));
        firstOperand = null;
        operator = null;
        waitingForSecondOperand = false;
        updateDisplay();
    }

    function clearAll() {
        displayValue = '0';
        firstOperand = null;
        operator = null;
        waitingForSecondOperand = false;
        updateDisplay();
    }

    function toggleSign() {
        displayValue = String(parseFloat(displayValue) * -1);
        updateDisplay();
    }

    function percent() {
        displayValue = String(parseFloat(displayValue) / 100);
        updateDisplay();
    }
</script>
</body>
</html>
