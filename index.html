<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TG Calculator</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --btn-gray: #e5e5ea;
            --btn-orange: #ff9f0a;
            --text-color: #000;
        }

        /* Адаптация под темную тему Telegram */
        body.tg-dark {
            --bg-color: #1c1c1e;
            --btn-gray: #3a3a3c;
            --btn-orange: #ff9f0a;
            --text-color: #fff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .calculator {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        #display {
            font-size: 4rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 1.5rem;
            font-weight: 500;
            cursor: pointer;
            background-color: var(--btn-gray);
            color: var(--text-color);
            transition: opacity 0.1s;
        }

        button:active { opacity: 0.7; }

        .operator { background-color: var(--btn-orange); color: white; }
        .zero { grid-column: span 2; aspect-ratio: initial; border-radius: 40px; }
        .special { background-color: #a5a5a5; color: black; }
    </style>
</head>
<body>

<div class="calculator">
    <div id="display">0</div>
    <div class="buttons">
        <button class="special" onclick="clearDisplay()">AC</button>
        <button class="special" onclick="toggleSign()">+/-</button>
        <button class="special" onclick="percentage()">%</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button class="zero" onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачивает окно на весь экран

    let currentInput = '0';
    const displayElement = document.getElementById('display');

    function updateDisplay() {
        displayElement.innerText = currentInput;
    }

    function appendNumber(num) {
        if (currentInput === '0') currentInput = num;
        else currentInput += num;
        updateDisplay();
    }

    function appendOperator(op) {
        currentInput += ' ' + op + ' ';
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '0';
        updateDisplay();
    }

    function calculate() {
        try {
            // Заменяем символы для корректного вычисления
            let result = eval(currentInput.replace('×', '*').replace('÷', '/'));
            currentInput = result.toString();
            updateDisplay();
        } catch {
            currentInput = 'Ошибка';
            updateDisplay();
        }
    }

    function toggleSign() {
        currentInput = (parseFloat(currentInput) * -1).toString();
        updateDisplay();
    }

    function percentage() {
        currentInput = (parseFloat(currentInput) / 100).toString();
        updateDisplay();
    }
</script>
</body>
</html>
