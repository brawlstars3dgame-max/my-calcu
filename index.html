<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Новогодний Калькулятор</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #0a192f; /* Темно-синий праздничный фон */
            --btn-num: rgba(255, 255, 255, 0.1);
            --btn-op: #c41e3a; /* Рождественский красный */
            --btn-sp: #2e7d32; /* Еловый зеленый */
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            background: radial-gradient(circle, #1a365d 0%, #0a192f 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 100vh;
            overflow: hidden;
        }

        /* Гирлянда */
        .garland {
            position: absolute;
            top: 0;
            width: 100%;
            height: 40px;
            background: url('https://transparentpng.com') repeat-x;
            background-size: contain;
            z-index: 10;
            filter: drop-shadow(0 0 5px gold);
        }

        /* Мигающие огоньки (эффект на фоне) */
        .snow {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            background: url('https://transparentpng.com');
            animation: snowMove 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes snowMove {
            from { background-position: 0 0; }
            to { background-position: 500px 1000px; }
        }

        #display {
            padding: 20px;
            text-align: right;
            font-size: 3.5rem;
            font-weight: 300;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            z-index: 5;
        }

        /* Контейнер с "мишурой" */
        .calc-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px 30px 0 0;
            padding: 20px;
            border-top: 3px solid var(--btn-sp);
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: 2px solid transparent;
            border-radius: 15px;
            height: 65px;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* Эффект мерцания на кнопках (как огоньки на мишуре) */
        button::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        button:active { transform: scale(0.95); opacity: 0.8; }

        .n { background: var(--btn-num); border-color: rgba(255,255,255,0.1); }
        .o { background: var(--btn-op); box-shadow: 0 0 10px rgba(196, 30, 58, 0.4); }
        .s { background: var(--btn-sp); box-shadow: 0 0 10px rgba(46, 125, 50, 0.4); }

        .zero { grid-column: span 2; }

        /* Иконка елочки на кнопке AC */
        .s-ac { font-size: 1rem; }

        @media (max-height: 700px) {
            button { height: 55px; }
            #display { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="garland"></div>
    <div class="snow"></div>

    <div id="display">0</div>

    <div class="calc-container">
        <div class="buttons-grid">
            <button class="s" onclick="allClear()">🎄 AC</button>
            <button class="s" onclick="invert()">+/-</button>
            <button class="s" onclick="percent()">%</button>
            <button class="o" onclick="handleOp('/')">÷</button>

            <button class="n" onclick="inputDigit('7')">7</button>
            <button class="n" onclick="inputDigit('8')">8</button>
            <button class="n" onclick="inputDigit('9')">9</button>
            <button class="o" onclick="handleOp('*')">×</button>

            <button class="n" onclick="inputDigit('4')">4</button>
            <button class="n" onclick="inputDigit('5')">5</button>
            <button class="n" onclick="inputDigit('6')">6</button>
            <button class="o" onclick="handleOp('-')">−</button>

            <button class="n" onclick="inputDigit('1')">1</button>
            <button class="n" onclick="inputDigit('2')">2</button>
            <button class="n" onclick="inputDigit('3')">3</button>
            <button class="o" onclick="handleOp('+')">+</button>

            <button class="n zero" onclick="inputDigit('0')">0</button>
            <button class="n" onclick="inputDigit('.')">,</button>
            <button class="o" onclick="calculate()">🎁</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    
    // Настройка цвета статус-бара Telegram под дизайн
    tg.setHeaderColor('#1a365d');

    let state = {
        displayValue: '0',
        firstOperand: null,
        operator: null,
        waitingForSecond: false
    };

    function updateDisplay() {
        const display = document.getElementById('display');
        display.innerText = state.displayValue.slice(0, 10);
    }

    function inputDigit(digit) {
        if (state.waitingForSecond) {
            state.displayValue = digit;
            state.waitingForSecond = false;
        } else {
            state.displayValue = state.displayValue === '0' ? digit : state.displayValue + digit;
        }
        updateDisplay();
        if(window.Telegram.WebApp.HapticFeedback) {
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function handleOp(nextOp) {
        const val = parseFloat(state.displayValue);
        if (state.operator && state.waitingForSecond) {
            state.operator = nextOp;
            return;
        }
        if (state.firstOperand === null) {
            state.firstOperand = val;
        } else if (state.operator) {
            const result = perform(state.firstOperand, val, state.operator);
            state.displayValue = String(result);
            state.firstOperand = result;
        }
        state.waitingForSecond = true;
        state.operator = nextOp;
        updateDisplay();
    }

    function perform(first, second, op) {
        if (op === '+') return first + second;
        if (op === '-') return first - second;
        if (op === '*') return first * second;
        if (op === '/') return first / second;
        return second;
    }

    function calculate() {
        if (state.operator === null || state.waitingForSecond) return;
        const val = parseFloat(state.displayValue);
        state.displayValue = String(perform(state.firstOperand, val, state.operator));
        state.firstOperand = null;
        state.operator = null;
        state.waitingForSecond = false;
        updateDisplay();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function allClear() {
        state = { displayValue: '0', firstOperand: null, operator: null, waitingForSecond: false };
        updateDisplay();
    }

    function invert() {
        state.displayValue = String(parseFloat(state.displayValue) * -1);
        updateDisplay();
    }

    function percent() {
        state.displayValue = String(parseFloat(state.displayValue) / 100);
        updateDisplay();
    }
</script>
</body>
</html>
