<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TG Racing</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2e7d32; /* Цвет травы */
            overflow: hidden;
            font-family: sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: gold;
            font-size: 32px;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="ui">Счет: <span id="score">0</span></div>
    <div id="msg" onclick="resetGame()">СТОЛКНОВЕНИЕ!<br>Нажми, чтобы начать заново</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameActive = true;
    let touchX = canvas.width / 2;
    let touchY = canvas.height / 2;
    let isTouching = false;

    // Параметры машинки
    const car = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        w: 30,
        h: 50,
        angle: 0,
        speed: 0,
        maxSpeed: 5,
        accel: 0.2
    };

    // Препятствия и подарки
    let objects = [];

    function spawnObject() {
        if (!gameActive) return;
        const side = Math.random() > 0.5 ? 'left' : 'right';
        objects.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            type: Math.random() > 0.3 ? 'obstacle' : 'gift',
            size: 25
        });
    }

    // Овал трассы
    function drawTrack() {
        ctx.strokeStyle = '#555'; // Цвет асфальта
        ctx.lineWidth = 80;
        ctx.beginPath();
        ctx.ellipse(canvas.width/2, canvas.height/2, canvas.width/2.5, canvas.height/3, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Разметка
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 20]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawCar() {
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        
        // Корпус машинки
        ctx.fillStyle = '#c41e3a';
        ctx.fillRect(-car.w/2, -car.h/2, car.w, car.h);
        
        // Стекло
        ctx.fillStyle = 'lightblue';
        ctx.fillRect(-car.w/2 + 5, -car.h/2 + 5, car.w - 10, 15);
        
        ctx.restore();
    }

    function update() {
        if (!gameActive) return;

        if (isTouching) {
            // Движение к точке касания
            const dx = touchX - car.x;
            const dy = touchY - car.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > 5) {
                car.angle = Math.atan2(dy, dx) + Math.PI/2;
                car.x += (dx / dist) * car.maxSpeed;
                car.y += (dy / dist) * car.maxSpeed;
            }
        }

        // Логика объектов (сбор подарков и столкновения)
        objects.forEach((obj, index) => {
            const dist = Math.sqrt((car.x - obj.x)**2 + (car.y - obj.y)**2);
            
            if (dist < 30) {
                if (obj.type === 'gift') {
                    score += 10;
                    scoreEl.innerText = score;
                    objects.splice(index, 1);
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                } else {
                    gameOver();
                }
            }
        });

        // Создаем новые объекты, если их мало
        if (objects.length < 6) {
            const angle = Math.random() * Math.PI * 2;
            const rx = canvas.width / 2.5;
            const ry = canvas.height / 3;
            objects.push({
                x: canvas.width/2 + Math.cos(angle) * rx,
                y: canvas.height/2 + Math.sin(angle) * ry,
                type: Math.random() > 0.2 ? 'obstacle' : 'gift'
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawTrack();

        objects.forEach(obj => {
            ctx.font = '24px serif';
            ctx.fillText(obj.type === 'obstacle' ? '🚧' : '🎁', obj.x - 12, obj.y + 12);
        });

        drawCar();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameActive = false;
        msgEl.style.display = 'block';
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
    }

    function resetGame() {
        score = 0;
        scoreEl.innerText = score;
        car.x = canvas.width / 2;
        car.y = canvas.height - 100;
        objects = [];
        gameActive = true;
        msgEl.style.display = 'none';
    }

    // Обработка касаний
    canvas.addEventListener('touchstart', (e) => {
        isTouching = true;
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchmove', (e) => {
        touchX = e.touches[0].clientX;
        touchY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', () => isTouching = false);

    // Для мышки
    canvas.addEventListener('mousedown', (e) => { isTouching = true; touchX = e.clientX; touchY = e.clientY; });
    canvas.addEventListener('mousemove', (e) => { if(isTouching) { touchX = e.clientX; touchY = e.clientY; } });
    canvas.addEventListener('mouseup', () => isTouching = false);

    gameLoop();
</script>
</body>
</html>
