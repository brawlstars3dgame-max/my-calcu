<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NY Calc</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #0a192f;
            --gold: #ffd700;
            --btn-n: rgba(255, 255, 255, 0.1);
            --btn-o: #c41e3a;
            --btn-s: #2e7d32;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            background: radial-gradient(circle, #1a365d 0%, #0a192f 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation; /* Убирает задержку клика на смартфонах */
        }

        /* Декор */
        .garland {
            height: 35px;
            background: url('https://transparentpng.com') repeat-x;
            background-size: contain;
            filter: drop-shadow(0 0 5px gold);
        }

        #display {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 20px;
            font-size: 4rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .buttons-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            padding-bottom: 30px;
            border-radius: 30px 30px 0 0;
            border-top: 2px solid var(--btn-s);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 15px;
            height: 65px;
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.92); filter: brightness(1.3); }

        .n { background: var(--btn-n); }
        .o { background: var(--btn-o); box-shadow: 0 4px 10px rgba(196, 30, 58, 0.3); }
        .s { background: var(--btn-s); box-shadow: 0 4px 10px rgba(46, 125, 50, 0.3); }
        .zero { grid-column: span 2; }

        @media (max-height: 650px) {
            button { height: 50px; font-size: 1.2rem; }
            #display { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="garland"></div>

    <div id="display">0</div>

    <div class="buttons-container">
        <div class="grid">
            <button class="s" onclick="pressClear()">🎄 AC</button>
            <button class="s" onclick="pressInvert()">+/-</button>
            <button class="s" onclick="pressPercent()">%</button>
            <button class="o" onclick="pressOp('/')">÷</button>

            <button class="n" onclick="pressNum('7')">7</button>
            <button class="n" onclick="pressNum('8')">8</button>
            <button class="n" onclick="pressNum('9')">9</button>
            <button class="o" onclick="pressOp('*')">×</button>

            <button class="n" onclick="pressNum('4')">4</button>
            <button class="n" onclick="pressNum('5')">5</button>
            <button class="n" onclick="pressNum('6')">6</button>
            <button class="o" onclick="pressOp('-')">−</button>

            <button class="n" onclick="pressNum('1')">1</button>
            <button class="n" onclick="pressNum('2')">2</button>
            <button class="n" onclick="pressNum('3')">3</button>
            <button class="o" onclick="pressOp('+')">+</button>

            <button class="n zero" onclick="pressNum('0')">0</button>
            <button class="n" onclick="pressNum('.')">,</button>
            <button class="o" onclick="pressEqual()">🎁</button>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let currentVal = '0';
    let prevVal = null;
    let operator = null;
    let nextClear = false;

    const screen = document.getElementById('display');

    function update() {
        screen.innerText = currentVal.toString().slice(0, 10);
    }

    function pressNum(num) {
        if (nextClear) {
            currentVal = num;
            nextClear = false;
        } else {
            currentVal = currentVal === '0' && num !== '.' ? num : currentVal + num;
        }
        update();
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function pressOp(op) {
        prevVal = parseFloat(currentVal);
        operator = op;
        nextClear = true;
        if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function pressEqual() {
        if (!operator || prevVal === null) return;
        const current = parseFloat(currentVal);
        let res = 0;
        if (operator === '+') res = prevVal + current;
        if (operator === '-') res = prevVal - current;
        if (operator === '*') res = prevVal * current;
        if (operator === '/') res = prevVal / current;
        
        currentVal = res.toString();
        operator = null;
        prevVal = null;
        nextClear = true;
        update();
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }

    function pressClear() {
        currentVal = '0';
        prevVal = null;
        operator = null;
        nextClear = false;
        update();
    }

    function pressInvert() {
        currentVal = (parseFloat(currentVal) * -1).toString();
        update();
    }

    function pressPercent() {
        currentVal = (parseFloat(currentVal) / 100).toString();
        update();
    }
</script>
</body>
</html>
